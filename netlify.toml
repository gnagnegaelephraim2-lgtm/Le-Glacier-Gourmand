# ── Build ─────────────────────────────────────────────────────────────────────
[build]
  command   = "npm run build"
  publish   = "dist"
  functions = "netlify/functions"

# ── Local dev (netlify dev) ───────────────────────────────────────────────────
[dev]
  command     = "npm run dev"
  port        = 3000
  targetPort  = 3000

# ── Redirects ─────────────────────────────────────────────────────────────────

# API → Rust function
[[redirects]]
  from   = "/api/chat"
  to     = "/.netlify/functions/chat"
  status = 200

# SPA fallback (React Router)
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ── Cache headers ──────────────────────────────────────────────────────────────

# Hero images (large local PNGs) — cache 1 year
[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Product/gallery images served from /assets/
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# JS/CSS bundles
[[headers]]
  for = "/assets/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
