# ── Build ─────────────────────────────────────────────────────────────────────
[build]
  # 1. Build the React frontend
  # 2. Add the musl target (static binary, no system lib deps on Lambda)
  # 3. Compile the Rust function
  # 4. Place the bootstrap binary where Netlify expects it
  command = """
    npm run build && \
    curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y && \
    source $HOME/.cargo/env && \
    rustup default stable && \
    rustup target add x86_64-unknown-linux-musl && \
    cd functions-src && \
    cargo build --release --target x86_64-unknown-linux-musl && \
    mkdir -p ../netlify/functions/chat && \
    cp target/x86_64-unknown-linux-musl/release/bootstrap ../netlify/functions/chat/bootstrap
  """
  publish   = "dist"
  functions = "netlify/functions"

# ── Local dev (netlify dev) ───────────────────────────────────────────────────
[dev]
  command     = "npm run dev"
  port        = 3000
  targetPort  = 3000

# ── Redirects ─────────────────────────────────────────────────────────────────

# API → Rust function
[[redirects]]
  from   = "/api/chat"
  to     = "/.netlify/functions/chat"
  status = 200

# SPA fallback (React Router)
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ── Cache headers ──────────────────────────────────────────────────────────────

# Hero images (large local PNGs) — cache 1 year
[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Product/gallery images served from /assets/
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# JS/CSS bundles
[[headers]]
  for = "/assets/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
